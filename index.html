<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Anka AI - System Lokalny</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 15px; font-size: 15px; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .user { align-self: flex-end; background: #4e44ff; color: white; border-bottom-right-radius: 2px; }
        .anka { align-self: flex-start; background: #2a2a35; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #3a3a45; }
        .controls { padding: 30px; background: #16161d; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #222; }
        #btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #4e44ff; color: white; font-size: 35px; cursor: pointer; transition: 0.3s; }
        #btn.rec { background: #ff4444; transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }
        #status { margin-top: 15px; font-size: 13px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg anka">Cześć Bartek! System gotowy. Powiedz coś do mnie.</div>
</div>

<div class="controls">
    <button id="btn">🎤</button>
    <div id="status">Oczekiwanie...</div>
</div>

<script>
    const WEBHOOK_URL = "https://hook.eu1.make.com/atppdry0ou4brtqnmncxruqa0nkbz4h1";
    const chat = document.getElementById('chat-window');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let recorder, chunks = [];

    function print(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = async () => {
        if (!recorder || recorder.state === "inactive") {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const fd = new FormData();
                    fd.append('file', blob, 'voicemail.webm');

                    status.innerText = "Anka myśli...";
                    try {
                        const res = await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
                        const raw = await res.text(); // Pobieramy surowy tekst, żeby sprawdzić błędy
                        
                        try {
                            const data = JSON.parse(raw);
                            if (data.user_text) print(data.user_text, 'user');
                            if (data.assistant_text) print(data.assistant_text, 'anka');
                            if (data.audio) {
                                new Audio("data:audio/mpeg;base64," + data.audio).play();
                            }
                        } catch (e) {
                            // Jeśli to nie JSON, to pewnie Anka wysłała tylko tekst
                            print("Błąd formatu danych, ale odebrałam: " + raw, 'anka');
                        }
                    } catch (err) { print("Błąd sieci: " + err, 'anka'); }
                    chunks = [];
                    status.innerText = "Gotowa";
                };
                recorder.start();
                btn.classList.add('rec');
                status.innerText = "Nagrywanie...";
            } catch (err) { alert("Mikrofon! Sprawdź czy otwierasz plik przez serwer lub czy masz uprawnienia."); }
        } else {
            recorder.stop();
            btn.classList.remove('rec');
            status.innerText = "Wysyłanie...";
        }
    };
</script>
</body>
</html>
