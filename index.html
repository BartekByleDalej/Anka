<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anka AI - Mobile</title>
    <style>
        /* Blokujemy przesuwanie całej strony i dopasowujemy do ekranu telefonu */
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; /* Dynamiczna wysokość na telefonach */
            width: 100%;
            overflow: hidden; /* Cała strona nie skacze */
            background: #0f0f12; 
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Główny kontener - układ pionowy */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* OKNO CZATU - zajmuje całą wolną przestrzeń i tylko ono się przewija */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            -webkit-overflow-scrolling: touch; /* Płynne przewijanie na iPhone */
        }

        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 16px; 
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg { 
            align-self: flex-end; 
            background: #4e44ff; 
            color: white; 
            border-bottom-right-radius: 4px; 
        }

        .anka-msg { 
            align-self: flex-start; 
            background: #2a2a35; 
            color: #eee; 
            border-bottom-left-radius: 4px; 
            border: 1px solid #3a3a45;
        }

        /* PANEL DOLNY - ZAWSZE NA DOLE */
        .controls { 
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); /* Uwzględnia "kreskę" w nowym iPhone */
            background: #16161d; 
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #btn { 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: none; 
            background: #4e44ff; 
            color: white; 
            font-size: 32px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation; /* Szybsza reakcja na dotyk */
        }

        #btn.rec { background: #ff4444; box-shadow: 0 0 20px rgba(255,68,68,0.5); }

        #status { 
            margin-top: 10px; 
            font-size: 12px; 
            color: #666; 
            letter-spacing: 1px;
            height: 14px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="chat-window">
        <div class="bubble anka-msg">Cześć Bartek! Jestem gotowa na Twoim telefonie. Powiedz coś.</div>
    </div>

    <div class="controls">
        <button id="btn">🎤</button>
        <div id="status">GOTOWA</div>
    </div>
</div>

<script>
    const WEBHOOK_URL = "https://hook.eu1.make.com/atppdry0ou4brtqnmncxruqa0nkbz4h1";
    const chat = document.getElementById('chat-window');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let recorder, chunks = [];

    function addBubble(text, sender) {
        const b = document.createElement('div');
        b.className = `bubble ${sender}-msg`;
        b.innerText = text;
        chat.appendChild(b);
        // Automatyczne przewijanie do najnowszego tekstu
        chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }

    btn.onclick = async () => {
        if (!recorder || recorder.state === "inactive") {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: recorder.mimeType });
                    const fd = new FormData();
                    fd.append('file', blob, 'audio.webm');

                    status.innerText = "MYŚLĘ...";
                    try {
                        const res = await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
                        const data = await res.json();
                        
                        if (data.user_text) addBubble(data.user_text, 'user');
                        if (data.assistant_text) addBubble(data.assistant_text, 'anka');
                        if (data.audio) {
                            const audio = new Audio("data:audio/mpeg;base64," + data.audio);
                            audio.play();
                        }
                    } catch (e) {
                        addBubble("Błąd: " + e.message, "anka");
                    }
                    chunks = [];
                    status.innerText = "GOTOWA";
                };
                recorder.start();
                btn.classList.add('rec');
                status.innerText = "SŁUCHAM...";
            } catch (e) { alert("Błąd mikrofonu: " + e.message); }
        } else {
            recorder.stop();
            btn.classList.remove('rec');
            status.innerText = "PRZETWARZAM...";
        }
    };
</script>

</body>
</html>
